# Dataset build config — passed to scripts/build_dataset.py via --config

seed: 50

# Train/val/test split fractions (must sum to 1.0)
train: 0.5
val:   0.2
test:  0.3

# Datasets reserved for out-of-domain testing only (all subjects → test partition).
# These supplement datasets already marked role: test in configs/datasets.yaml.
test_datasets: null
  # - sct-testing-large

# Per-dataset slice multipliers (train only). Omit a dataset to use ×1.
dataset_factors: {}
  # lumbar-epfl: 7
  # lumbar-vanderbilt: 7
  # spider-challenge-2023: 3
  # whole-spine: 3

# Oversample ×2 slices near SC boundary or without SC (null = disabled)
border_oversample_mm: null

# SC/background balance per volume in train (null = disabled)
sc_ratio: null
