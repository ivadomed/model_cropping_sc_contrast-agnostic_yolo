# Pipeline orchestration config
# Edit this file to control which steps run and on which plane.

plane: axial        # axial | sagittal
start_step: 1       # 1–9
end_step: 9         # 1–9
seed: 50
make_splits: true   # true = regenerate splits from data/raw (step 2)

# Path overrides — leave empty to use auto-generated paths.
# Useful when resuming a run created outside this pipeline.
# NOTE: overrides only affect steps 4+ (build, train, eval, metrics, failures).
#       Step 3 (preprocess) always writes to the auto-generated processed_dir.
override_processed_dir: ""   # e.g. processed/pipeline_10mm_SI_1mm_axial_3ch
override_dataset_dir:   ""   # e.g. datasets/pipeline_10mm_SI_1mm_axial_3ch_20260504_120000
override_run_id:        ""   # e.g. pipeline_yolo26n_axial_20260504_120000
