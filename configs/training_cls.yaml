# Classification training config — passed to scripts/train_cls.py
# mode: classification distinguishes this from the detector config (training.yaml)
mode: classification

model: yolo26s-cls.pt
epochs: 200
imgsz: 320
batch: -1           # -1 = auto-detect optimal for GPU memory
device: "0"
patience: 100
workers: 2

# Confidence thresholds used at evaluation time (evaluate_cls.py)
cls_conf: 0.5   # min SC probability to classify a slice as SC-positive
det_conf: 0.1   # detector confidence threshold on SC-positive slices

# Dataset scope
superior_only: true  # true = restrict training and evaluation to slices [0, z2_GT]
                     # (superior transition brain→SC only; inferior SC→lumbar excluded)

wandb_entity: quentin-revillon-neuropoly
wandb_project: spine_detection
