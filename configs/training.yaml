# Training config — passed to scripts/train.py via --config
# mode selects which section (detection|classification) to run.
# Common keys (seed, device, workers, wandb_*) apply to both modes.

mode: detection  # detection | classification

seed: 50
device: "0"
workers: 2
wandb_entity: quentin-revillon-neuropoly
wandb_project: spine_detection

detection:
  model: yolo26n.pt   # yolo26{n,s,m,l,x}.pt | yolo12*.pt | yolo11*.pt
  epochs: 200
  imgsz: 320
  batch: -1           # -1 = auto-detect optimal for GPU memory
  patience: 100
  extra_augment: false  # extra MRI albumentations: bias field, invert, affine zoom
  fraction: 1.0         # fraction of dataset to use (1.0 = full)

classification:
  model: yolo26n-cls.pt
  epochs: 200
  imgsz: 320
  batch: -1
  patience: 100
  superior_only: true   # restrict training to slices [0, z2_GT] (superior boundary)
