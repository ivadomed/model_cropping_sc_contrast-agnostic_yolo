# Dataset registry for spine detection project.
#
# Fields per dataset:
#   name         : directory name in data/raw/
#   host         : neuro | spine-generic | spineimage
#   url_https    : HTTPS URL for browsing in a web browser
#   url_ssh      : SSH clone URL (null = manual download)
#   commit       : specific commit to pin (null = use HEAD/latest)
#   mask_suffix  : SC mask filename suffix (required)
#   canal_suffix : spinal canal mask suffix (null = no canal mask for this dataset)
#   labels_dir   : subdirectory under derivatives/ containing labels (default: labels)
#   role         : null (normal train/val/test split) | test (all subjects → test only, out-of-domain hold-out)
#
# spineimage datasets are cloned via SSH (Gitea) — requires SSH key access to spineimage.ca.

datasets:

