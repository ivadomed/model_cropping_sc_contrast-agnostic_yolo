# Training config — passed to scripts/train.py via --config

model: yolo26n.pt   # yolo26{n,s,m,l,x}.pt | yolo12*.pt | yolo11*.pt | yolov8*.pt
epochs: 200
imgsz: 320
batch: -1           # -1 = auto-detect optimal for GPU memory
device: "0"
patience: 100
workers: 2
fraction: 1.0       # fraction of dataset to use (e.g. 0.01 for a quick test)

fl_gamma: 2.0       # focal loss gamma (0.0 = standard BCE)

extra_augment: true # true = MRI albumentations (bias field, invert, affine zoom…)

wandb_entity: quentin-revillon-neuropoly  # "" = W&B default account
wandb_project: spine_detection
